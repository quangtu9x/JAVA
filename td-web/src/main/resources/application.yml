# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /

# Spring Configuration
spring:
  application:
    name: td-webapi
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  cache:
    type: redis

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:3s}

  # File Upload Limits
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 105MB
  
  # Database Configuration - PostgreSQL
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/tdwebapi}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: ${DATABASE_AUTO_COMMIT:false}
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: false
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 20
          batch_versioned_data: true
        connection:
          provider_disables_autocommit: true
    open-in-view: false
  
  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  
  # Jackson Configuration
  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    connection-timeout: ${ELASTICSEARCH_CONNECTION_TIMEOUT:3s}
    socket-timeout: ${ELASTICSEARCH_SOCKET_TIMEOUT:10s}
    username: ${ELASTICSEARCH_USERNAME:}
    password: ${ELASTICSEARCH_PASSWORD:}
  
# Security Configuration with Keycloak
app:
  security:
    keycloak:
      server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8180}
      realm: ${KEYCLOAK_REALM:td-webapi-realm}
      client-id: ${KEYCLOAK_CLIENT_ID:td-webapi-client}
      client-secret: ${KEYCLOAK_CLIENT_SECRET:}
  minio:
    url: ${MINIO_URL:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET_NAME:td-webapi-files}
  elasticsearch:
    enabled: ${ELASTICSEARCH_ENABLED:true}

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

# OpenAPI Documentation
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-native.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    doc-expansion: list
    try-it-out-enabled: true
    show-extensions: true
    oauth:
      client-id: ${KEYCLOAK_CLIENT_ID:td-webapi-client}
      client-secret: ${KEYCLOAK_CLIENT_SECRET:}
      app-name: TD Documents API
      scopes: openid,profile
  show-actuator: false
  use-management-port: false

# Logging Configuration
logging:
  level:
    com.td: INFO
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/td-webapi.log